# Plain HTTP. Works as a secure context only on localhost/127.0.0.1.
# Over the network, use the HTTPS server below (Web Crypto requires it).
server {
  listen 80;
  server_name _;
  include /etc/nginx/snippets/app.conf;
}

# HTTPS with a self-signed cert (generated on first start). Browsers will
# warn once about the cert; after you proceed, the page is a secure context
# and in-browser encryption works over the LAN.
server {
  listen 443 ssl;
  server_name _;

  ssl_certificate     /etc/nginx/certs/cert.pem;
  ssl_certificate_key /etc/nginx/certs/key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  include /etc/nginx/snippets/app.conf;
}
